name: Build RingerVolume

on:
  push:
    branches: [ "**" ]

jobs:
  build:
    runs-on: macos-12

    steps:
    - uses: actions/checkout@v3
      
    - name: Set execute permission for ipabuild.sh
      run: chmod +x ./ipabuild.sh
      
    - name: Make IPA
      run: ./ipabuild.sh
      
    - uses: actions/upload-artifact@v3
      with:
        name: IPA Download
        path: build/RingerVolume.ipa
